<!-- subject : Welcome to Rubiq Ride – Let’s Get Moving 🚕 -->

<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Sekuya&display=swap"
    rel="stylesheet">
  <title>Welcome Passenger</title>
  <style>
    body {
      margin: 0;
      background: #f4f6f8;
      font-family: 'Alan Sans', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
    }

    .header {
      background: #5D3A1A;
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    .content {
      padding: 24px;
      color: #333;
    }

    .footer {
      background: #5D3A1A;
      padding: 14px;
      font-size: 12px;
      text-align: center;
      color: #fffdfd;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: #5D3A1A;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      margin-top: 16px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>Rubiq Ride</h1>
    </div>

    <div class="content">
      <h2>Welcome, {{name}} &#127881;</h2>
      <p>
        Thank you for joining <strong>Rubiq Ride</strong>.
      </p>

      <p>
        You can now book rides easily, track your trips, and travel with confidence.
      </p>

      <p>
        We’re happy to have you with us.
      </p>

      <a href="{{appLink}}" class="btn">Book Your First Ride</a>
    </div>

    <div class="footer">
      &copy; {{year}} Rubiq Ride. Ride safe.
    </div>
  </div>
</body>

</html>
